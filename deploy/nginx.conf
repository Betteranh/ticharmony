# /etc/nginx/sites-available/ticharmony
# Remplace "ticharmony.be" par ton vrai nom de domaine

server {
    listen 80;
    server_name ticharmony.be www.ticharmony.be;

    # Certbot ajoutera automatiquement la redirection HTTPS ici
    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}