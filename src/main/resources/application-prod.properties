# ── Base de données (MariaDB production) ──────────────────────────────────────
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver

# ── HikariCP (pool de connexions) ─────────────────────────────────────────────
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.pool-name=TicHarmonyPool

# ── Thymeleaf (cache activé en production) ────────────────────────────────────
spring.thymeleaf.cache=true

# ── Logs (pas de SQL visible, uniquement erreurs app) ─────────────────────────
logging.level.root=warn
logging.level.be.stage.ticharmony=info
logging.level.org.hibernate.SQL=warn

# ── JPA (pas de DDL auto en prod, Flyway gère le schéma) ─────────────────────
spring.jpa.hibernate.ddl-auto=validate

# ── Proxy inverse Nginx (HTTPS) ───────────────────────────────────────────────
server.forward-headers-strategy=native

# ── Cookie sécurité (HTTPS uniquement en prod) ────────────────────────────────
server.servlet.session.cookie.secure=true
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.same-site=strict

# ── Email Resend ──────────────────────────────────────────────────────────────
resend.api-key=${RESEND_API_KEY}
app.base-url=${APP_BASE_URL}
app.mail.override-to=