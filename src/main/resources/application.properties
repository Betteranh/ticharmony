spring.application.name=ticharmony

# Database configuration - LOCAL (MySQL)
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/tic_harmony?useSSL=false&serverTimezone=Europe/Brussels&useLegacyDatetimeCode=false&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}

# Database configuration - PRODUCTION (MariaDB) - Uncomment for deployment
#spring.datasource.url=${DB_URL:jdbc:mariadb://localhost:3306/tic_harmony?allowPublicKeyRetrieval=true&useSSL=false}
#spring.datasource.username=${DB_USERNAME:tic_harmony_user}
#spring.datasource.password=${DB_PASSWORD:}
#spring.datasource.driver-class-name=org.mariadb.jdbc.Driver
# Log level configuration
logging.level.root=warn
logging.level.be.stage.ticharmony=info
# Flyway
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.out-of-order=true
# Thymeleaf (cache désactivé en dev, activé en prod via application-prod.properties)
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.mode=HTML
spring.thymeleaf.encoding=UTF-8
spring.thymeleaf.cache=false
# Timeout Session (1 heure)
server.servlet.session.timeout=1h
# Cookie sécurité
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.same-site=strict
# Ferme la connexion DB avant le rendu des templates
spring.jpa.open-in-view=false
# Resend email service
resend.api-key=${RESEND_API_KEY:}
# Base URL for links in emails (change to prod URL when deployed)
app.base-url=${APP_BASE_URL:http://localhost:8080}
# Override destinataire emails (dev uniquement - laisser vide en prod)
app.mail.override-to=${MAIL_OVERRIDE_TO:}


