spring.application.name=ticharmony

# Database configuration - LOCAL (MySQL)
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/tic_harmony?useSSL=false&serverTimezone=Europe/Brussels&useLegacyDatetimeCode=false&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}

# Database configuration - PRODUCTION (MariaDB) - Uncomment for deployment
#spring.datasource.url=${DB_URL:jdbc:mariadb://localhost:3306/tic_harmony?allowPublicKeyRetrieval=true&useSSL=false}
#spring.datasource.username=${DB_USERNAME:tic_harmony_user}
#spring.datasource.password=${DB_PASSWORD:}
#spring.datasource.driver-class-name=org.mariadb.jdbc.Driver
# Log level configuration
logging.level.root=error
logging.level.be.iccbxl=info
# Flyway
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.out-of-order=true
# Thymeleaf
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.mode=HTML
spring.thymeleaf.encoding=UTF-8
spring.thymeleaf.cache=false 
# Timeout Session (1 hour for better security)
server.servlet.session.timeout=1h
logging.level.org.springframework.boot.context.config=DEBUG

