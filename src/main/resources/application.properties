spring.application.name=ticharmony
spring.datasource.url=jdbc:mysql://localhost:3306/tic_harmony?useSSL=false&serverTimezone=Europe/Brussels&useLegacyDatetimeCode=false&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=
#spring.datasource.url=jdbc:mariadb://localhost:3306/tic_harmony
#spring.datasource.username=tic_harmony_user
#spring.datasource.password=Tic12345!
#spring.datasource.driver-class-name=org.mariadb.jdbc.Driver
# Log level configuration
logging.level.root=error
logging.level.be.iccbxl=info
# Flyway
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.out-of-order=true
# Thymeleaf
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.mode=HTML
spring.thymeleaf.encoding=UTF-8
spring.thymeleaf.cache=false 
# Timeout Session
server.servlet.session.timeout=4h
logging.level.org.springframework.boot.context.config=DEBUG

