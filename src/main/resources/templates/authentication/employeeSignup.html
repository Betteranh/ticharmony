<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/main}">

<head>
    <title>Inscription Employé - TIC Harmony</title>
</head>

<body class="bg-gradient-to-br from-blue-50 via-indigo-50 to-purple-50 pattern-dots min-h-screen">
<div layout:fragment="content" class="flex items-center justify-center min-h-screen px-4 py-12">
    <div class="w-full max-w-2xl">
        <!-- Breadcrumb / Retour -->
        <div class="mb-6">
            <a th:href="@{/employees}" class="inline-flex items-center gap-2 text-gray-700 hover:text-blue-600 font-medium transition group">
                <svg class="w-5 h-5 group-hover:-translate-x-1 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
                </svg>
                Retour à la liste des utilisateurs
            </a>
        </div>

        <!-- Carte principale -->
        <div class="bg-white rounded-3xl shadow-2xl overflow-hidden">
            <!-- En-tête -->
            <div class="bg-gradient-to-r from-blue-600 to-indigo-600 px-8 py-6 text-center">
                <div class="inline-flex items-center justify-center w-16 h-16 bg-white rounded-2xl shadow-lg mb-4 float-animation">
                    <img th:src="@{/images/tic.png}" alt="TIC Harmony" class="w-12 h-12 object-contain"/>
                </div>
                <h1 class="text-3xl font-extrabold text-white mb-2">Inscription Employé</h1>
                <p class="text-blue-100">Créez votre compte TIC Harmony</p>
            </div>

            <!-- Formulaire -->
            <div class="p-8 md:p-10">
                <form th:action="@{/employeeSignup}" method="post" th:object="${user}" class="space-y-6">
                    <!-- Section : Informations personnelles -->
                    <div class="space-y-4">
                        <div class="flex items-center gap-3 pb-3 border-b-2 border-blue-100">
                            <div class="bg-blue-100 rounded-lg p-2">
                                <svg class="w-5 h-5 text-blue-600" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
                                </svg>
                            </div>
                            <h2 class="text-xl font-bold text-gray-900">Informations personnelles</h2>
                        </div>

                        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                            <div>
                                <label for="firstname" class="block font-semibold text-gray-700 mb-2">
                                    Prénom <span class="text-red-500">*</span>
                                </label>
                                <input type="text" id="firstname" th:field="*{firstname}" required
                                       placeholder="Jean"
                                       class="input-modern w-full"/>
                            </div>
                            <div>
                                <label for="lastname" class="block font-semibold text-gray-700 mb-2">
                                    Nom <span class="text-red-500">*</span>
                                </label>
                                <input type="text" id="lastname" th:field="*{lastname}" required
                                       placeholder="Dupont"
                                       class="input-modern w-full"/>
                            </div>
                        </div>

                        <div>
                            <label for="telephone" class="block font-semibold text-gray-700 mb-2">
                                Téléphone
                            </label>
                            <input type="text" id="telephone" th:field="*{telephone}"
                                   placeholder="+32 4XX XX XX XX"
                                   class="input-modern w-full"/>
                        </div>

                        <div>
                            <label for="adresse" class="block font-semibold text-gray-700 mb-2">
                                Adresse
                            </label>
                            <input type="text" id="adresse" th:field="*{adresse}"
                                   placeholder="Rue, Numéro, Code postal Ville"
                                   class="input-modern w-full"/>
                        </div>
                    </div>

                    <!-- Section : Informations de connexion -->
                    <div class="space-y-4">
                        <div class="flex items-center gap-3 pb-3 border-b-2 border-indigo-100">
                            <div class="bg-indigo-100 rounded-lg p-2">
                                <svg class="w-5 h-5 text-indigo-600" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 5.25a3 3 0 013 3m3 0a6 6 0 01-7.029 5.912c-.563-.097-1.159.026-1.563.43L10.5 17.25H8.25v2.25H6v2.25H2.25v-2.818c0-.597.237-1.17.659-1.591l6.499-6.499c.404-.404.527-1 .43-1.563A6 6 0 1121.75 8.25z"/>
                                </svg>
                            </div>
                            <h2 class="text-xl font-bold text-gray-900">Informations de connexion</h2>
                        </div>

                        <div>
                            <label for="login" class="block font-semibold text-gray-700 mb-2">
                                Nom d'utilisateur <span class="text-red-500">*</span>
                            </label>
                            <input type="text" id="login" th:field="*{login}" maxlength="60" required
                                   placeholder="john.doe"
                                   class="input-modern w-full"/>
                            <p class="text-xs text-gray-500 mt-1">Maximum 60 caractères</p>
                        </div>

                        <div>
                            <label for="email" class="block font-semibold text-gray-700 mb-2">
                                Email <span class="text-red-500">*</span>
                            </label>
                            <input type="email" id="email" th:field="*{email}" required
                                   placeholder="john.doe@example.com"
                                   class="input-modern w-full"/>
                        </div>

                        <div>
                            <label for="password" class="block font-semibold text-gray-700 mb-2">
                                Mot de passe <span class="text-red-500">*</span>
                            </label>
                            <input type="password" id="password" th:field="*{password}" maxlength="60" required
                                   placeholder="••••••••"
                                   class="input-modern w-full"/>
                            <div class="mt-2 p-3 bg-blue-50 rounded-lg border border-blue-100">
                                <div class="text-xs text-blue-800 space-y-1">
                                    <div class="flex items-start gap-2">
                                        <span class="text-blue-600">•</span>
                                        <span>Minimum 8 caractères recommandés</span>
                                    </div>
                                    <div class="flex items-start gap-2">
                                        <span class="text-blue-600">•</span>
                                        <span>Utilisez lettres, chiffres et symboles</span>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Message d'erreur -->
                    <div th:if="${errorMessage}" class="p-4 bg-red-50 border-2 border-red-200 rounded-xl">
                        <div class="flex items-center gap-3">
                            <svg class="w-6 h-6 text-red-600 flex-shrink-0" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m9-.75a9 9 0 11-18 0 9 9 0 0118 0zm-9 3.75h.008v.008H12v-.008z"/>
                            </svg>
                            <p class="text-red-700 font-semibold" th:text="${errorMessage}"></p>
                        </div>
                    </div>

                    <!-- Bouton de soumission -->
                    <div class="pt-2">
                        <button type="submit" class="btn-primary w-full py-4 text-base font-bold shadow-lg hover:shadow-xl transition-all">
                            <span class="flex items-center justify-center gap-2">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" d="M18 7.5v3m0 0v3m0-3h3m-3 0h-3m-2.25-4.125a3.375 3.375 0 11-6.75 0 3.375 3.375 0 016.75 0zM3 19.235v-.11a6.375 6.375 0 0112.75 0v.109A12.318 12.318 0 019.374 21c-2.331 0-4.512-.645-6.374-1.766z"/>
                                </svg>
                                Créer mon compte
                            </span>
                        </button>
                    </div>
                </form>

                <!-- Lien de connexion -->
                <div class="mt-6 text-center">
                    <p class="text-gray-600">
                        Vous avez déjà un compte ?
                        <a th:href="@{/login}" class="text-blue-600 hover:text-blue-700 font-semibold transition hover:underline">
                            Connectez-vous ici
                        </a>
                    </p>
                </div>
            </div>
        </div>


    </div>
</div>
</body>
</html>
