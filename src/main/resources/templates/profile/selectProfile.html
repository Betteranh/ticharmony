<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/main}">
<head>
    <title>Choisir un profil – Tic Harmony</title>
    <style>
        body { background: #faf9f7 !important; }

        :root {
            --cream:    #faf9f7;
            --cream-d:  #ede9e3;
            --text:     #1c1917;
            --text-2:   #78716c;
            --text-3:   #a8a29e;
            --violet:   #7c3aed;
            --violet-bg:#f5f3ff;
            --violet-br:#ddd6fe;
            --sh:       0 2px 12px rgba(0,0,0,.07), 0 1px 4px rgba(0,0,0,.04);
            --sh-lg:    0 8px 32px rgba(0,0,0,.09), 0 3px 10px rgba(0,0,0,.05);
        }

        .sp-root {
            font-family: 'DM Sans', sans-serif;
            color: var(--text);
            padding: 3rem 0 6rem;
            max-width: 640px;
            margin: 0 auto;
        }

        /* ── Header ── */
        .sp-company {
            font-size: .72rem;
            font-weight: 700;
            letter-spacing: .1em;
            text-transform: uppercase;
            color: var(--text-3);
            margin-bottom: .4rem;
        }
        .sp-title {
            font-family: 'Sora', sans-serif;
            font-weight: 800;
            font-size: 1.9rem;
            color: var(--text);
            letter-spacing: -.035em;
            line-height: 1.15;
            margin-bottom: 2.25rem;
        }

        /* ── Profile grid ── */
        .sp-grid {
            display: flex;
            flex-wrap: wrap;
            gap: .85rem;
            margin-bottom: 1.5rem;
        }

        /* Profile card */
        .sp-card {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: .55rem;
            background: #fff;
            border: 1.5px solid var(--cream-d);
            border-radius: 16px;
            padding: 1.4rem 1.1rem 1.1rem;
            width: 118px;
            cursor: pointer;
            transition: border-color .18s, box-shadow .18s, transform .15s;
            box-shadow: var(--sh);
            opacity: 0;
            animation: spUp .35s ease forwards;
        }
        .sp-card:hover {
            border-color: var(--violet-br);
            box-shadow: 0 6px 20px rgba(124,58,237,.12);
            transform: translateY(-3px);
        }

        /* Stagger */
        .sp-card:nth-child(1) { animation-delay: .04s; }
        .sp-card:nth-child(2) { animation-delay: .09s; }
        .sp-card:nth-child(3) { animation-delay: .14s; }
        .sp-card:nth-child(4) { animation-delay: .19s; }
        .sp-card:nth-child(5) { animation-delay: .24s; }
        .sp-card:nth-child(6) { animation-delay: .29s; }

        @keyframes spUp {
            from { opacity: 0; transform: translateY(8px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .sp-avatar {
            width: 52px; height: 52px;
            border-radius: 14px;
            display: flex; align-items: center; justify-content: center;
            font-family: 'Sora', sans-serif;
            font-size: 1.25rem;
            font-weight: 800;
            color: #fff;
            letter-spacing: -.01em;
        }
        .sp-name {
            font-family: 'DM Sans', sans-serif;
            font-size: .8rem;
            font-weight: 600;
            color: var(--text);
            text-align: center;
            max-width: 100px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        /* ── Add profile button ── */
        .sp-add-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: .55rem;
            background: transparent;
            border: 1.5px dashed var(--cream-d);
            border-radius: 16px;
            padding: 1.4rem 1.1rem 1.1rem;
            width: 118px;
            cursor: pointer;
            color: var(--text-3);
            font-family: 'DM Sans', sans-serif;
            font-size: .8rem;
            font-weight: 600;
            transition: border-color .18s, color .18s, background .18s, transform .15s;
            animation: spUp .35s .34s ease forwards;
            opacity: 0;
        }
        .sp-add-btn:hover {
            border-color: var(--violet-br);
            color: var(--violet);
            background: var(--violet-bg);
            transform: translateY(-3px);
        }
        .sp-add-icon {
            width: 52px; height: 52px;
            border-radius: 14px;
            background: var(--cream);
            border: 1.5px solid var(--cream-d);
            display: flex; align-items: center; justify-content: center;
            transition: background .18s, border-color .18s;
        }
        .sp-add-btn:hover .sp-add-icon {
            background: var(--violet-bg);
            border-color: var(--violet-br);
        }

        /* ── Manage toggle ── */
        .sp-manage-row {
            margin-top: .25rem;
        }
        .sp-manage-link {
            font-family: 'DM Sans', sans-serif;
            font-size: .75rem;
            font-weight: 600;
            color: var(--text-3);
            background: none;
            border: none;
            cursor: pointer;
            padding: 0;
            transition: color .15s;
            text-decoration: underline;
            text-decoration-color: transparent;
            text-underline-offset: 3px;
        }
        .sp-manage-link:hover { color: var(--text-2); text-decoration-color: var(--text-3); }

        /* ── Manage section ── */
        .sp-manage-section {
            display: none;
            margin-top: 1.5rem;
            background: #fff;
            border: 1px solid var(--cream-d);
            border-radius: 16px;
            box-shadow: var(--sh);
            overflow: hidden;
        }
        .sp-manage-section.open { display: block; }

        .sp-manage-header {
            padding: .9rem 1.25rem;
            border-bottom: 1px solid var(--cream-d);
        }
        .sp-manage-title {
            font-family: 'Sora', sans-serif;
            font-size: .88rem;
            font-weight: 700;
            color: var(--text);
        }

        .sp-manage-row-item {
            display: flex;
            align-items: center;
            gap: .85rem;
            padding: .85rem 1.25rem;
            border-bottom: 1px solid var(--cream-d);
        }
        .sp-manage-row-item:last-child { border-bottom: none; }

        .sp-manage-avatar {
            width: 34px; height: 34px;
            border-radius: 9px;
            display: flex; align-items: center; justify-content: center;
            font-family: 'Sora', sans-serif;
            font-size: .78rem;
            font-weight: 800;
            color: #fff;
            flex-shrink: 0;
        }
        .sp-manage-name {
            font-family: 'DM Sans', sans-serif;
            font-size: .85rem;
            font-weight: 600;
            color: var(--text);
            flex: 1;
        }
        .sp-deactivate-btn {
            font-family: 'DM Sans', sans-serif;
            font-size: .68rem;
            font-weight: 700;
            color: #dc2626;
            background: #fef2f2;
            border: 1px solid #fecaca;
            border-radius: 7px;
            padding: 4px 10px;
            cursor: pointer;
            transition: background .15s;
        }
        .sp-deactivate-btn:hover { background: #fee2e2; }

        /* ── Create modal ── */
        .sp-modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,.35);
            z-index: 200;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
            opacity: 0;
            pointer-events: none;
            transition: opacity .2s;
        }
        .sp-modal-overlay.open {
            opacity: 1;
            pointer-events: auto;
        }
        .sp-modal {
            background: #fff;
            border: 1px solid var(--cream-d);
            border-radius: 20px;
            padding: 1.75rem;
            width: 100%;
            max-width: 360px;
            box-shadow: var(--sh-lg);
            transform: scale(.97) translateY(6px);
            transition: transform .2s;
        }
        .sp-modal-overlay.open .sp-modal { transform: scale(1) translateY(0); }

        .sp-modal-title {
            font-family: 'Sora', sans-serif;
            font-weight: 800;
            font-size: 1rem;
            color: var(--text);
            margin-bottom: 1.2rem;
        }
        .sp-label {
            font-size: .7rem;
            font-weight: 700;
            color: var(--text-3);
            letter-spacing: .07em;
            text-transform: uppercase;
            display: block;
            margin-bottom: .35rem;
        }
        .sp-input {
            width: 100%;
            background: var(--cream);
            border: 1.5px solid var(--cream-d);
            border-radius: 9px;
            padding: .6rem .85rem;
            font-family: 'DM Sans', sans-serif;
            font-size: .88rem;
            color: var(--text);
            outline: none;
            transition: border-color .15s;
            margin-bottom: 1rem;
        }
        .sp-input:focus { border-color: var(--violet-br); background: #fff; }

        .sp-colors {
            display: flex;
            gap: .45rem;
            flex-wrap: wrap;
            margin-bottom: 1.25rem;
        }
        .sp-color-opt {
            width: 26px; height: 26px;
            border-radius: 7px;
            cursor: pointer;
            border: 2.5px solid transparent;
            transition: transform .12s;
            outline: 2px solid transparent;
            outline-offset: 2px;
        }
        .sp-color-opt:hover { transform: scale(1.15); }
        .sp-color-opt.selected { outline-color: var(--violet); }

        .sp-modal-actions {
            display: flex;
            gap: .6rem;
            justify-content: flex-end;
        }
        .sp-btn-cancel {
            font-family: 'DM Sans', sans-serif;
            font-size: .8rem;
            font-weight: 600;
            color: var(--text-2);
            background: none;
            border: 1.5px solid var(--cream-d);
            border-radius: 8px;
            padding: .5rem 1rem;
            cursor: pointer;
            transition: border-color .15s, color .15s;
        }
        .sp-btn-cancel:hover { border-color: var(--text-3); color: var(--text); }
        .sp-btn-create {
            font-family: 'DM Sans', sans-serif;
            font-size: .8rem;
            font-weight: 700;
            color: #fff;
            background: var(--violet);
            border: none;
            border-radius: 8px;
            padding: .5rem 1.25rem;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(124,58,237,.25);
            transition: background .15s, transform .1s;
        }
        .sp-btn-create:hover { background: #6d28d9; transform: translateY(-1px); }
    </style>
</head>

<div layout:fragment="content" class="sp-root">

    <!-- Header -->
    <p class="sp-company" th:text="${companyName}">Entreprise</p>
    <h1 class="sp-title">Qui êtes-vous ?</h1>

    <!-- Profile cards grid -->
    <div class="sp-grid">

        <!-- Active profiles -->
        <div th:each="p : ${profiles}">
            <form th:action="@{/select-profile/{id}(id=${p.id})}" method="post" style="display:contents;">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <button type="submit" class="sp-card">
                    <div class="sp-avatar"
                         th:style="'background:' + ${p.color}"
                         th:text="${#strings.substring(p.displayName, 0, 1).toUpperCase()}">J</div>
                    <span class="sp-name" th:text="${p.displayName}">Jean</span>
                </button>
            </form>
        </div>

        <!-- Add profile -->
        <button type="button" class="sp-add-btn" id="openCreateModal">
            <div class="sp-add-icon">
                <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15"/>
                </svg>
            </div>
            <span>Ajouter</span>
        </button>

    </div>

    <!-- Manage profiles toggle -->
    <div class="sp-manage-row" th:if="${!#lists.isEmpty(profiles)}">
        <button type="button" class="sp-manage-link" id="toggleManage">
            Gérer les profils
        </button>
    </div>

    <!-- Manage section -->
    <div class="sp-manage-section" id="manageSection" th:if="${!#lists.isEmpty(profiles)}">
        <div class="sp-manage-header">
            <span class="sp-manage-title">Désactiver un profil</span>
        </div>
        <div th:each="p : ${profiles}" class="sp-manage-row-item">
            <div class="sp-manage-avatar"
                 th:style="'background:' + ${p.color}"
                 th:text="${#strings.substring(p.displayName, 0, 1).toUpperCase()}">J</div>
            <span class="sp-manage-name" th:text="${p.displayName}">Jean</span>
            <form th:action="@{/profiles/{id}/deactivate(id=${p.id})}" method="post" style="margin:0;">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <button type="submit" class="sp-deactivate-btn">Désactiver</button>
            </form>
        </div>
    </div>

</div>

<!-- Create profile modal -->
<div layout:fragment="scripts">
    <div class="sp-modal-overlay" id="createModal">
        <div class="sp-modal">
            <p class="sp-modal-title">Nouveau profil</p>
            <form th:action="@{/profiles/create}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <label class="sp-label" for="displayName">Prénom ou nom</label>
                <input class="sp-input" type="text" name="displayName" id="displayName"
                       placeholder="Ex : Jean, Marie..." maxlength="50" required autocomplete="off">
                <label class="sp-label">Couleur de l'avatar</label>
                <input type="hidden" name="color" id="selectedColor" th:value="${availableColors[0]}">
                <div class="sp-colors">
                    <div th:each="c, i : ${availableColors}"
                         class="sp-color-opt"
                         th:classappend="${i.index == 0} ? ' selected' : ''"
                         th:style="'background:' + ${c}"
                         th:attr="data-color=${c}"
                         onclick="selectColor(this)">
                    </div>
                </div>
                <div class="sp-modal-actions">
                    <button type="button" class="sp-btn-cancel" id="cancelCreate">Annuler</button>
                    <button type="submit" class="sp-btn-create">Créer le profil</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        // Modal
        const modal = document.getElementById('createModal');
        document.getElementById('openCreateModal').addEventListener('click', () => {
            modal.classList.add('open');
            document.getElementById('displayName').focus();
        });
        document.getElementById('cancelCreate').addEventListener('click', () => modal.classList.remove('open'));
        modal.addEventListener('click', e => { if (e.target === modal) modal.classList.remove('open'); });
        document.addEventListener('keydown', e => { if (e.key === 'Escape') modal.classList.remove('open'); });

        // Color picker
        function selectColor(el) {
            document.querySelectorAll('.sp-color-opt').forEach(c => c.classList.remove('selected'));
            el.classList.add('selected');
            document.getElementById('selectedColor').value = el.dataset.color;
        }

        // Manage toggle
        const toggleBtn = document.getElementById('toggleManage');
        if (toggleBtn) {
            toggleBtn.addEventListener('click', function () {
                const section = document.getElementById('manageSection');
                section.classList.toggle('open');
                this.textContent = section.classList.contains('open') ? 'Masquer' : 'Gérer les profils';
            });
        }
    </script>
</div>

</html>
