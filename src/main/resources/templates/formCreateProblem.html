<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      layout:decorate="~{layouts/main}">
<head>
    <title>Signaler un problème</title>
    <style>
        body { background: #faf9f7 !important; }

        :root {
            --white:    #ffffff;
            --cream:    #faf9f7;
            --cream-d:  #ede9e3;
            --text:     #1c1917;
            --text-2:   #78716c;
            --text-3:   #a8a29e;
            --violet:   #7c3aed;
            --violet-bg:#f5f3ff;
            --violet-br:#ddd6fe;
            --red:      #dc2626;
            --sh:       0 2px 12px rgba(0,0,0,.07), 0 1px 4px rgba(0,0,0,.04);
        }

        .fc-root {
            font-family: 'DM Sans', sans-serif;
            color: var(--text);
            padding: 2.5rem 0 6rem;
            max-width: 660px;
            margin: 0 auto;
        }

        /* ── Back link ── */
        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: .85rem;
            font-weight: 600;
            color: var(--text-3);
            text-decoration: none;
            margin-bottom: 2rem;
            transition: color .15s;
        }
        .back-link:hover { color: var(--violet); }
        .back-link svg { transition: transform .15s; }
        .back-link:hover svg { transform: translateX(-3px); }

        /* ── Page title ── */
        .page-title {
            font-family: 'Sora', sans-serif;
            font-size: 1.8rem;
            font-weight: 800;
            color: var(--text);
            letter-spacing: -.03em;
            margin-bottom: .3rem;
        }
        .page-sub {
            font-size: .95rem;
            color: var(--text-2);
            margin-bottom: 2rem;
        }

        /* ── Step card ── */
        .step-card {
            background: var(--white);
            border-radius: 18px;
            box-shadow: var(--sh);
            padding: 1.75rem 2rem;
            margin-bottom: 1rem;
        }
        .step-question {
            font-family: 'Sora', sans-serif;
            font-size: 1.1rem;
            font-weight: 800;
            color: var(--text);
            margin-bottom: 1.25rem;
        }

        /* ── Labels & inputs ── */
        .fc-label {
            display: block;
            font-size: .82rem;
            font-weight: 600;
            color: var(--text-2);
            margin-bottom: .4rem;
        }
        .fc-label .req { color: var(--red); }
        .fc-input {
            width: 100%;
            padding: .75rem 1rem;
            background: var(--cream);
            border: 1px solid var(--cream-d);
            border-radius: 10px;
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            font-size: .95rem;
            outline: none;
            transition: border-color .2s, box-shadow .2s, background .2s;
        }
        .fc-input::placeholder { color: var(--text-3); }
        .fc-input:focus {
            border-color: var(--violet);
            background: var(--white);
            box-shadow: 0 0 0 3px rgba(124,58,237,.1);
        }
        textarea.fc-input {
            resize: none;
            min-height: 140px;
            line-height: 1.65;
            font-size: 1rem;
        }

        /* ── Category grid ── */
        .cat-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: .55rem;
            margin-top: .75rem;
        }
        @media (max-width: 480px) { .cat-grid { grid-template-columns: 1fr; } }

        .cat-card {
            display: flex;
            align-items: center;
            gap: .7rem;
            padding: .8rem .95rem;
            background: var(--cream);
            border: 2px solid var(--cream-d);
            border-radius: 11px;
            cursor: pointer;
            transition: border-color .15s, background .15s;
            position: relative;
        }
        .cat-card:hover { border-color: var(--violet-br); background: var(--violet-bg); }
        .cat-card.selected { border-color: var(--violet); background: var(--violet-bg); }
        .cat-card input[type=radio] { position: absolute; opacity: 0; width: 0; height: 0; }
        .cat-emoji { font-size: 1.3rem; flex-shrink: 0; line-height: 1; }
        .cat-name {
            font-family: 'Sora', sans-serif;
            font-size: .82rem;
            font-weight: 700;
            color: var(--text);
        }
        .cat-desc { font-size: .72rem; color: var(--text-3); margin-top: .1rem; }


        /* ── Error ── */
        .fc-error {
            padding: .9rem 1rem;
            background: #fef2f2;
            border: 1px solid #fecaca;
            border-radius: 10px;
            color: var(--red);
            font-size: .88rem;
            font-weight: 600;
            margin-bottom: 1rem;
        }

        /* ── Buttons ── */
        .btn-submit {
            display: inline-flex;
            align-items: center;
            gap: 9px;
            padding: 1rem 2.25rem;
            background: var(--violet);
            color: #fff;
            font-family: 'Sora', sans-serif;
            font-size: 1rem;
            font-weight: 700;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            box-shadow: 0 4px 14px rgba(124,58,237,.28);
            transition: background .15s, transform .15s;
        }
        .btn-submit:hover { background: #6d28d9; transform: translateY(-1px); }
        .btn-submit svg { transition: transform .15s; }
        .btn-submit:hover svg { transform: translateX(3px); }

        .btn-cancel {
            display: inline-flex;
            align-items: center;
            padding: 1rem 1.6rem;
            background: var(--white);
            border: 1px solid var(--cream-d);
            color: var(--text-2);
            font-family: 'Sora', sans-serif;
            font-size: .9rem;
            font-weight: 600;
            border-radius: 12px;
            text-decoration: none;
            transition: background .15s, color .15s;
        }
        .btn-cancel:hover { background: var(--cream-d); color: var(--text); }

        /* ── Contact footer ── */
        .contact-footer {
            text-align: center;
            margin-top: 1.5rem;
            font-size: .85rem;
            color: var(--text-3);
        }
        .contact-footer a {
            color: var(--violet);
            font-weight: 600;
            text-decoration: none;
        }
        .contact-footer a:hover { text-decoration: underline; }

        /* ── Animations ── */
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(12px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        .fu { opacity: 0; animation: fadeUp .4s ease forwards; }
        .d1 { animation-delay: .03s; }
        .d2 { animation-delay: .09s; }
        .d3 { animation-delay: .15s; }
        .d4 { animation-delay: .21s; }
        .d5 { animation-delay: .27s; }
        .d6 { animation-delay: .33s; }
    </style>
</head>

<div layout:fragment="content" class="fc-root">

    <!-- Retour -->
    <a sec:authorize="hasRole('ADMIN')" th:href="@{/adminDashboard}" class="back-link fu d1">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
             stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/>
        </svg>
        Retour
    </a>
    <a sec:authorize="hasRole('CLIENT')" th:href="@{/clientDashboard}" class="back-link fu d1">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
             stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/>
        </svg>
        Retour
    </a>

    <div class="fu d1">
        <h1 class="page-title">Signaler un problème</h1>
        <p class="page-sub">Notre équipe vous répond dans les 24 heures.</p>
    </div>

    <form method="post" th:action="@{/problems/save}" th:object="${problem}">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

        <!-- 1. Qu'est-ce qui se passe ? -->
        <div class="step-card fu d2">
            <div class="step-question">Qu'est-ce qui se passe ? 🖥️</div>

            <div class="mb-4">
                <label for="title" class="fc-label">En une phrase <span class="req">*</span></label>
                <input type="text" id="title" th:field="*{title}" maxlength="120"
                       placeholder="Ex : Mon ordinateur ne s'allume plus"
                       class="fc-input" required/>
            </div>
            <div>
                <label for="description" class="fc-label">Décrivez ce qui se passe <span class="req">*</span></label>
                <textarea id="description" th:field="*{description}"
                          placeholder="Expliquez-nous le problème avec vos propres mots. Depuis quand ? Y a-t-il un message à l'écran ? Qu'avez-vous essayé ?"
                          class="fc-input" required></textarea>
            </div>
        </div>

        <!-- 2. Catégorie -->
        <div class="step-card fu d3">
            <div class="step-question">Ça concerne quoi ? 🗂️</div>
            <p style="font-size:.88rem; color:var(--text-3); margin-bottom:.75rem;">Sélectionnez la case qui correspond à votre problème.</p>
            <div class="cat-grid" id="catGrid">
                <label class="cat-card" data-cat>
                    <input type="radio" th:field="*{category}" value="Réseau et connectivité" required>
                    <span class="cat-emoji">🌐</span>
                    <div><div class="cat-name">Internet / Réseau</div><div class="cat-desc">Connexion, Wi-Fi…</div></div>
                </label>
                <label class="cat-card" data-cat>
                    <input type="radio" th:field="*{category}" value="Matériel informatique" required>
                    <span class="cat-emoji">🖥️</span>
                    <div><div class="cat-name">Matériel</div><div class="cat-desc">Ordinateur, imprimante…</div></div>
                </label>
                <label class="cat-card" data-cat>
                    <input type="radio" th:field="*{category}" value="Logiciels et applications" required>
                    <span class="cat-emoji">📱</span>
                    <div><div class="cat-name">Logiciel / Application</div><div class="cat-desc">Programme, erreur…</div></div>
                </label>
                <label class="cat-card" data-cat>
                    <input type="radio" th:field="*{category}" value="Sécurité informatique" required>
                    <span class="cat-emoji">🔒</span>
                    <div><div class="cat-name">Sécurité / Accès</div><div class="cat-desc">Mot de passe, virus…</div></div>
                </label>
                <label class="cat-card" data-cat>
                    <input type="radio" th:field="*{category}" value="Autre" required>
                    <span class="cat-emoji">💬</span>
                    <div><div class="cat-name">Autre</div><div class="cat-desc">Non listé ci-dessus</div></div>
                </label>
            </div>
        </div>

        <!-- 3. Vos coordonnées -->
        <div class="step-card fu d4">
            <div class="step-question">Qui faites-vous cette demande ? 👤</div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
                <div>
                    <label for="ticketFirstName" class="fc-label">Prénom <span class="req">*</span></label>
                    <input type="text" id="ticketFirstName" th:field="*{ticketUserInfo.firstName}"
                           placeholder="Ex : Marie" class="fc-input" required/>
                </div>
                <div>
                    <label for="ticketLastName" class="fc-label">Nom <span class="req">*</span></label>
                    <input type="text" id="ticketLastName" th:field="*{ticketUserInfo.lastName}"
                           placeholder="Ex : Dupont" class="fc-input" required/>
                </div>
            </div>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                    <label for="ticketEmail" class="fc-label">E-mail <span class="req">*</span></label>
                    <input type="email" id="ticketEmail" th:field="*{ticketUserInfo.email}"
                           placeholder="vous@votreentreprise.be" class="fc-input" required/>
                </div>
                <div>
                    <label for="ticketPhone" class="fc-label">Téléphone <span class="req">*</span></label>
                    <input type="text" id="ticketPhone" th:field="*{ticketUserInfo.phone}"
                           placeholder="Ex : 0495 12 34 56" class="fc-input" required/>
                </div>
            </div>
        </div>

        <!-- Erreur -->
        <div th:if="${errorMessage}" class="fc-error" th:text="${errorMessage}"></div>

        <!-- Boutons -->
        <div class="flex flex-col sm:flex-row gap-3 fu d5">
            <button type="submit" class="btn-submit">
                Envoyer ma demande
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                     stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/>
                </svg>
            </button>
            <a sec:authorize="hasRole('ADMIN')" th:href="@{/adminDashboard}" class="btn-cancel">Annuler</a>
            <a sec:authorize="hasRole('CLIENT')" th:href="@{/clientDashboard}" class="btn-cancel">Annuler</a>
        </div>

        <p class="contact-footer fu d5">
            Problème critique ? Appelez-nous :
            <a href="tel:+32495576535">+32 (0) 495 57 65 35</a>
        </p>

    </form>
</div>

<th:block layout:fragment="scripts">
    <script>
        /*<![CDATA[*/
        /* Category selection */
        document.querySelectorAll('[data-cat]').forEach(function(card) {
            var radio = card.querySelector('input[type=radio]');
            if (radio && radio.checked) card.classList.add('selected');
            card.addEventListener('click', function() {
                document.querySelectorAll('[data-cat]').forEach(function(c) { c.classList.remove('selected'); });
                card.classList.add('selected');
            });
        });

        /*]]>*/
    </script>
</th:block>

</html>
